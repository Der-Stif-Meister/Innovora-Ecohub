services:
  - type: web
    name: ecohub-website
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: ecohub-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ecohub-postgres
    engine: postgres
    version: "15"
    plan: free
    ipAllowList: []
