<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoHub Admin{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .admin-wrapper {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: linear-gradient(135deg, #1e4226 0%, #2d5d34 100%);
            padding: 2rem 1rem;
            overflow-y: auto;
            color: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar h2 {
            margin-bottom: 2rem;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background: rgba(102, 204, 51, 0.3);
            color: white;
        }

        .sidebar nav a i {
            width: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: 250px;
            flex: 1;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .admin-header-bar {
            background: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
        }

        .admin-header-bar h1 {
            color: #1e4226;
            font-size: 1.3rem;
        }

        .logout-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            color: #1e4226;
            border: 1px solid #1e4226;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: #1e4226;
            color: white;
        }

        .admin-content {
            padding: 2rem;
        }

        .admin-form-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 2rem;
        }

        .admin-header > div:first-child h1 {
            color: #1e4226;
            margin: 0 0 0.5rem 0;
        }

        .admin-header > div:first-child p {
            color: #999;
            margin: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
            }

            .main-content {
                margin-left: 0;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>🎯 EcoHub Admin</h2>
            <nav>
                <a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="{{ url_for('admin_team') }}" class="{% if request.endpoint in ['admin_team', 'admin_team_add', 'admin_team_edit'] %}active{% endif %}">
                    <i class="fas fa-users"></i> Team
                </a>
                <a href="{{ url_for('admin_programs') }}" class="{% if request.endpoint in ['admin_programs', 'admin_programs_add', 'admin_programs_edit'] %}active{% endif %}">
                    <i class="fas fa-calendar-alt"></i> Programs
                </a>
                <a href="{{ url_for('admin_alerts') }}" class="{% if request.endpoint in ['admin_alerts', 'admin_alerts_add'] %}active{% endif %}">
                    <i class="fas fa-bell"></i> Alerts
                </a>
                <a href="{{ url_for('admin_messages') }}">
                    <i class="fas fa-envelope"></i> Messages
                </a>
                <a href="{{ url_for('admin_upload') }}">
                    <i class="fas fa-cloud-upload-alt"></i> Upload
                </a>
                <a href="{{ url_for('admin_files') }}">
                    <i class="fas fa-file"></i> Files
                </a>
                <hr style="border: none; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 1rem 0;">
                <a href="{{ url_for('logout') }}" style="color: rgba(255, 100, 100, 0.9);">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
