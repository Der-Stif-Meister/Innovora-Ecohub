<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoHub Admin{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #1e4226 0%, #2d5d34 100%);
            padding: 2rem 1rem;
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            margin-bottom: 2rem;
            font-size: 1.3rem;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background: rgba(102, 204, 51, 0.25);
            color: #fff;
        }

        .sidebar hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        /* MAIN */
        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
        }

        .topbar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .topbar h1 {
            font-size: 1.2rem;
            color: #1e4226;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #1e4226;
            background: transparent;
            color: #1e4226;
            border-radius: 6px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #1e4226;
            color: white;
        }

        .content {
            padding: 2rem;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>🎯 EcoHub Admin</h2>

        <nav>
            <a href="{{ url_for('admin_dashboard') }}"
               class="{% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>

            <a href="{{ url_for('admin_team') }}"
               class="{% if request.endpoint.startswith('admin_team') %}active{% endif %}">
                <i class="fas fa-users"></i> Team
            </a>

            <a href="{{ url_for('admin_programs') }}"
               class="{% if request.endpoint in ['admin_programs', 'admin_programs_add', 'admin_programs_edit', 'admin_programs_delete'] %}active{% endif %}">
                <i class="fas fa-calendar-alt"></i> Programs
            </a>

            <a href="{{ url_for('admin_alerts') }}"
               class="{% if request.endpoint.startswith('admin_alerts') %}active{% endif %}">
                <i class="fas fa-bell"></i> Alerts
            </a>

            <a href="{{ url_for('admin_messages') }}">
                <i class="fas fa-envelope"></i> Messages
            </a>

            <a href="{{ url_for('admin_upload') }}">
                <i class="fas fa-cloud-upload-alt"></i> Upload
            </a>

            <a href="{{ url_for('admin_files') }}">
                <i class="fas fa-file"></i> Files
            </a>

            <hr>

            <!-- FIXED LOGOUT -->
            <a href="{{ url_for('admin_logout') }}"
               style="color: rgba(255,100,100,0.9);">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="topbar">
            <h1>{% block page_title %}Admin Panel{% endblock %}</h1>

            <a class="logout-btn" href="{{ url_for('admin_logout') }}">
                Logout
            </a>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </main>

</div>

</body>
</html>
